<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Save Our Wildlife</h1>
        <div class="video-container">
            <video id="wildlife-video" controls width="100%" aria-label="Wildlife promotional video">
                <source src="wildlife.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <p>Join us in our mission to protect and preserve wildlife across the globe. Every action counts.</p>
        <button id="toggle-button" aria-controls="wildlife-video">Toggle Video</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
